bind r source-file ~/.tmux.conf 
set -g mouse on
# Enable status bar
set -g status on
set -g status-position bottom
set -g status-justify centre
set -g status-interval 5   # refresh every 5 seconds

# Status bar colors
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"  # dark background, light text

# Left section (session name)
set -g status-left "#[fg=#a6e3a1,bold] #S "  # greenish session name
set -g status-left-length 10

# Right section (time/date)
set -g status-right "#[fg=#89b4fa]%I:%M #[fg=#fab387]%Y-%m-%d"
set -g status-right-length 20

# Window (tab) style
set -g window-status-format " #[fg=#6c7086]#I:#W "  # inactive tabs – gray
set -g window-status-current-format " #[bold,fg=#1e1e2e,bg=#89b4fa]#I:#W #[default]"  # active tab – highlighted blue
set -g window-status-separator " | "  # separator between tabs

# Index starting at 1
set -g base-index 1
set -g pane-base-index 1

# Optional: border style for splits
set -g pane-border-style "fg=#6c7086"
set -g pane-active-border-style "fg=#89b4fa"


# Vim movement
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Resize panes with Alt + hjkl
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# Move between tabs using ALT + 1 ~ 9
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9


# Create splits using ALT + Enter & ALT + \\
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-Enter split-window -v -c "#{pane_current_path}"

# Create splits using CTRL + Shift + Enter & CTRL + Shift + \\
# bind-key -n C-S-\\ split-window -h -c "#{pane_current_path}"
# bind-key -n C-S-Enter split-window -v -c "#{pane_current_path}"

# Enable true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
